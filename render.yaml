services:
  - type: web
    name: openveda-fastapi
    env: python
    region: ohio
    plan: starter
    buildCommand: "curl -LsSf https://astral.sh/uv/install.sh | sh && $HOME/.cargo/bin/uv venv && $HOME/.cargo/bin/uv pip install -r apps/api/pyproject.toml"
    startCommand: "cd apps/api && $HOME/.cargo/bin/uv run uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false
      
  - type: web
    name: openveda-langgraph
    env: python
    plan: starter
    region: ohio
    buildCommand: "curl -LsSf https://astral.sh/uv/install.sh | sh && $HOME/.cargo/bin/uv venv && $HOME/.cargo/bin/uv pip install -r apps/ai-engine/pyproject.toml"
    startCommand: "cd apps/ai-engine && $HOME/.cargo/bin/uv run python agent.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    name: openveda-web
    env: node
    region: ohio
    buildCommand: "npm install && npm run build:prod"
    startCommand: "npm start --workspace=web"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_FASTAPI_URL
        fromService:
          type: web
          name: openveda-fastapi
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_LANGGRAPH_URL
        fromService:
          type: web
          name: openveda-langgraph
          envVarKey: RENDER_EXTERNAL_URL
