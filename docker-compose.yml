version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: openveda_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openveda
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: openveda_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: openveda_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - AI_SERVICE_URL=http://ai:8001
    depends_on:
      - redis

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: openveda_ai
    restart: always
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - redis
      - db

  ai-worker:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: openveda_ai_worker
    restart: always
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - redis
      - ai

  scoring:
    build:
      context: ./apps/scoring
      dockerfile: Dockerfile
    container_name: openveda_scoring
    restart: always
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: openveda_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY:-}
      - NEXT_PUBLIC_FASTAPI_URL=http://localhost:8000
    depends_on:
      - api
      - ai
      - scoring

volumes:
  pgdata:
